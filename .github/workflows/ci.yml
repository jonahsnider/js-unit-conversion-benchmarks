name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  run-benchmarks:
    name: Run benchmarks

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Enable Corepack
        # Required due to a limitation in setup-node https://github.com/actions/setup-node/issues/480#issuecomment-1820622085
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'
      - name: Install dependencies with Yarn
        run: yarn install --immutable
      - name: Run benchmarks
        run: yarn start
        env:
          NODE_ENV: production
      - name: Generate GitHub App token
        if: ${{ github.ref == 'refs/heads/main' }}
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
      - name: Configure Git user
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: Homebrew/actions/git-user-config@main
        with:
          token: ${{ steps.app-token.outputs.token }}
          username: ${{ steps.app-token.outputs.app-slug }}[bot]
      - name: Commit benchmark results
        if: ${{ github.ref == 'refs/heads/main' }}
        id: commit-benchmark-results
        run: |
          git add readme.md
          if git diff --cached --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "docs: update benchmark results [skip ci]"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Push benchmark results
        if: ${{ steps.commit-benchmark-results.outputs.created == 'true' }}
        uses: Homebrew/actions/git-try-push@main
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: main

  test:
    name: Run library tests

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
      - name: Enable Corepack
        # Required due to a limitation in setup-node https://github.com/actions/setup-node/issues/480#issuecomment-1820622085
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'
      - name: Install dependencies with Yarn
        run: yarn install --immutable
      - name: Run tests
        run: yarn test
        env:
          NODE_ENV: production

  typecheck:
    name: Typecheck

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
      - name: Enable Corepack
        # Required due to a limitation in setup-node https://github.com/actions/setup-node/issues/480#issuecomment-1820622085
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'
      - name: Install dependencies with Yarn
        run: yarn install --immutable
      - name: Typecheck
        run: yarn run build
  style:
    name: Check style

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
      - name: Enable Corepack
        # Required due to a limitation in setup-node https://github.com/actions/setup-node/issues/480#issuecomment-1820622085
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'yarn'
      - name: Install dependencies with Yarn
        run: yarn install --immutable
      - name: Check style with Prettier
        run: yarn run style
